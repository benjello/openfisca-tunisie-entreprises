name: OpenFisca Tunisie Entreprises

on:
  push:
  pull_request:
    types: [opened, reopened]

env:
  DEFAULT_PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v4
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Build package
        run: make build

  lint:
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v4
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ env.DEFAULT_PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Check syntax errors
        run: make check-syntax-errors
      - name: Check style
        run: make check-style
      - name: Lint YAML
        run: make check-yaml

  test:
    runs-on: ubuntu-24.04
    needs: [build]
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v4
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Run tests
        run: make test

  deploy:
    runs-on: ubuntu-24.04
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v4
      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ env.DEFAULT_PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Build package
        run: make build
      - name: Publish to PyPI
        run: uv run twine upload dist/* --username __token__ --password $PYPI_TOKEN
