# ---------------------------------------------------------------------------
# Résultat fiscal
# ---------------------------------------------------------------------------

- name: "Résultat fiscal = résultat comptable + réintégrations − déductions"
  # Résultat comptable : 100 000 DT
  # Réintégrations (amendes) : + 5 000 DT
  # Déductions (dividendes) :  − 8 000 DT
  # Résultat fiscal = 97 000 DT
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        resultat_avant_impot: 100000.0
        reintegration_amendes_penalites: 5000.0
        deduction_dividendes_participation: 8000.0
  output:
    entreprises:
      ent_1:
        resultat_fiscal: 97000.0


- name: "Résultat fiscal déficitaire — plafonné à zéro (déficit non imposé)"
  # Résultat comptable : −20 000 DT → résultat fiscal = max(…, 0) = 0
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        resultat_avant_impot: -20000.0
  output:
    entreprises:
      ent_1:
        resultat_fiscal: 0.0


# ---------------------------------------------------------------------------
# IS brut
# ---------------------------------------------------------------------------

- name: "IS brut taux normal — résultat fiscal × 15 % (2023)"
  # Résultat comptable : 200 000 DT ; taux normal 15 % → IS brut = 30 000 DT
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        resultat_avant_impot: 200000.0
        categorie_is: 1
  output:
    entreprises:
      ent_1:
        is_brut: 30000.0


# ---------------------------------------------------------------------------
# TMI
# ---------------------------------------------------------------------------

- name: "TMI = CA brut × 0,2 %"
  # CA local : 5 000 000 DT → TMI = 10 000 DT
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        chiffre_affaires_local: 5000000.0
  output:
    entreprises:
      ent_1:
        tmi: 10000.0


- name: "TMI — plancher absolu 500 DT (CA trop faible pour dépasser le minimum)"
  # CA local : 10 000 DT → TMI taux = 20 DT < 500 DT → TMI = 500 DT
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        chiffre_affaires_local: 10000.0
  output:
    entreprises:
      ent_1:
        tmi: 500.0


- name: "IS dû avant dégrèvement = TMI si TMI > IS brut"
  # CA : 5 000 000 DT → TMI = 10 000 DT
  # Résultat fiscal : 20 000 DT → IS brut (15 %) = 3 000 DT
  # IS dû = max(3 000, 10 000) = 10 000 DT
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        chiffre_affaires_local: 5000000.0
        resultat_avant_impot: 20000.0
        categorie_is: 1
        annees_activite: 10
        est_exonere_is: false
  output:
    entreprises:
      ent_1:
        is_du_avant_degrevement: 10000.0


# ---------------------------------------------------------------------------
# Acomptes et solde IS
# ---------------------------------------------------------------------------

- name: "Solde IS à payer = IS net − acomptes (3 × 30 % de l'IS N-1)"
  # Résultat fiscal ≈ 266 667 DT → IS net ≈ 40 000 DT
  # IS N-1 = 30 000 DT → acomptes = 3 × 30 % × 30 000 = 27 000 DT
  # Solde ≈ 40 000 − 27 000 = 13 000 DT
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        resultat_avant_impot: 266667.0
        categorie_is: 1
        annees_activite: 10
        est_exonere_is: false
        is_exercice_precedent: 30000.0
  output:
    entreprises:
      ent_1:
        solde_is_a_payer: 13000.0


# ---------------------------------------------------------------------------
# Taux IS ETE post-exonération (Art. 49-I CIRPPIS)
# ---------------------------------------------------------------------------

- name: "Taux IS ETE après 10 ans — réduit à la moitié du taux normal (7,5 %)"
  # Après les 10 ans d'exonération : taux = taux_is_applicable / 2 = 15 % / 2 = 7,5 %
  period: "2023"
  relative_error_margin: 0.001
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        est_totalement_exportatrice: true
        annees_dans_regime_ete: 12
        categorie_is: 1
  output:
    entreprises:
      ent_1:
        taux_is_ete_apres_exoneration: 0.075


- name: "Taux IS ETE pendant la période d'exonération — taux normal applicable (pas de réduction)"
  # Tant que annees_dans_regime_ete ≤ 10 : pas de réduction de taux
  period: "2023"
  relative_error_margin: 0.001
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        est_totalement_exportatrice: true
        annees_dans_regime_ete: 8
        categorie_is: 1
  output:
    entreprises:
      ent_1:
        taux_is_ete_apres_exoneration: 0.15
