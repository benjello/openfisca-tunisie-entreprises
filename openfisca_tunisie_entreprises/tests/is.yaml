# Tests YAML — Chaîne de calcul IS
#
# Traduit les tests Python test_is.py en format YAML OpenFisca.
# Couvre : taux IS par catégorie (2023/2024), résultat fiscal, IS brut,
#          TMI (taux + plancher), IS dû, solde IS, taux ETE post-exonération.
#
# Exécution : openfisca test openfisca_tunisie_entreprises/tests/test_is.yaml -c openfisca_tunisie_entreprises


# ---------------------------------------------------------------------------
# Taux IS par catégorie — exercice 2023
# ---------------------------------------------------------------------------

- name: "Taux IS normal — 15 % (exercice 2023)"
  period: "2023"
  relative_error_margin: 0.001
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        categorie_is: 1
  output:
    entreprises:
      ent_1:
        taux_is_applicable: 0.15


- name: "Taux IS majoré — 35 % banques/assurances (exercice 2023)"
  period: "2023"
  relative_error_margin: 0.001
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        categorie_is: 0
  output:
    entreprises:
      ent_1:
        taux_is_applicable: 0.35


- name: "Taux IS réduit — 10 % (exercice 2023)"
  period: "2023"
  relative_error_margin: 0.001
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        categorie_is: 2
  output:
    entreprises:
      ent_1:
        taux_is_applicable: 0.10


- name: "Taux IS intermédiaire — 35 % opérateurs télécom / grandes surfaces (2023)"
  period: "2023"
  relative_error_margin: 0.001
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        categorie_is: 3
  output:
    entreprises:
      ent_1:
        taux_is_applicable: 0.35


