# ---------------------------------------------------------------------------
# Exonération agriculture et pêche (10 ans)
# ---------------------------------------------------------------------------

- name: "Exonération IS agriculture/pêche — pendant les 10 premières années"
  # IS brut hypothétique = 30 000 DT ; année 6 → exonéré
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        resultat_avant_impot: 200000.0
        categorie_is: 1
        est_investissement_agriculture_peche: true
        annees_dans_regime_agriculture_peche: 6
  output:
    entreprises:
      ent_1:
        exoneration_is_agriculture_peche: 30000.0


- name: "Exonération IS agriculture/pêche — nulle après 10 ans"
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
