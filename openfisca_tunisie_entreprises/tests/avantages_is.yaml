# Tests YAML — Avantages IS : nouvelles entreprises, réinvestissement physique,
#              déduction export temporalisée, report déficitaire 5 ans
#
# Exécution : openfisca test openfisca_tunisie_entreprises/tests/test_avantages_is.yaml


# ---------------------------------------------------------------------------
# Déduction export temporalisée — coupure au 1er janvier 2021
# ---------------------------------------------------------------------------

- name: "Déduction export ⅔ applicable en 2020 (avant suppression)"
  # Résultat comptable : 300 000 DT ; taux export : 50 %
  # Bénéfice export = 300 000 × 50 % = 150 000 DT
  # Déduction = 150 000 × 2/3 ≈ 100 000 DT
  period: "2020"
  relative_error_margin: 0.001
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        resultat_avant_impot: 300000.0
        ventes_marchandises_local: 150000.0
        ventes_marchandises_export: 150000.0
  output:
    entreprises:
      ent_1:
        deduction_revenus_export: 100000.0


- name: "Déduction export supprimée dès 2021"
  # Mêmes données qu'en 2020 mais période 2021 → déduction = 0
  period: "2021"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        resultat_avant_impot: 300000.0
        ventes_marchandises_local: 150000.0
        ventes_marchandises_export: 150000.0
  output:
    entreprises:
      ent_1:
        deduction_revenus_export: 0.0


# ---------------------------------------------------------------------------
# Report déficitaire 5 ans — structure par millésime
# ---------------------------------------------------------------------------

- name: "Report déficitaire — 3 exercices déficitaires dans la fenêtre de 5 ans"
  # Déficits : N-1 = 40 000 DT, N-3 = 20 000 DT, N-5 = 10 000 DT
  # Total imputé = 70 000 DT
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        deficit_ordinaire_annee_n1: 40000.0
        deficit_ordinaire_annee_n2: 0.0
        deficit_ordinaire_annee_n3: 20000.0
        deficit_ordinaire_annee_n4: 0.0
        deficit_ordinaire_annee_n5: 10000.0
  output:
    entreprises:
      ent_1:
        deficits_anterieurs_ordinaires_reportes: 70000.0


- name: "Report déficitaire — imputation limite : résultat fiscal plafonné à zéro"
  # Résultat comptable = 50 000 DT ; déficits ordinaires N-1 = 80 000 DT
  # Résultat fiscal brut = 50 000 DT ; après imputation 80 000 → plafonné à 0
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        resultat_avant_impot: 50000.0
        deficit_ordinaire_annee_n1: 80000.0
  output:
    entreprises:
      ent_1:
        resultat_fiscal: 0.0


# ---------------------------------------------------------------------------
# Réinvestissement physique — biens d'équipement (dégrèvement Art. 7 § I CII)
# ---------------------------------------------------------------------------

- name: "Déduction réinvestissement physique — 35 % du montant investi"
  # Résultat fiscal : 500 000 DT ; investissement équipements : 200 000 DT
  # Plafond 35 % = 35 % × 500 000 = 175 000 DT
  # Déduction = min(0.35 × 200 000, 175 000) = min(70 000, 175 000) = 70 000 DT
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        resultat_avant_impot: 500000.0
        categorie_is: 1
        investissement_biens_equipement: 200000.0
  output:
    entreprises:
      ent_1:
        deduction_reinvestissement_base: 70000.0


- name: "Déduction réinvestissement physique plafonnée au bénéfice (35 %)"
  # Résultat fiscal : 100 000 DT ; investissement équipements : 600 000 DT
  # 35 % × 600 000 = 210 000 DT > 100 000 → plafonné au bénéfice = 100 000 DT
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        resultat_avant_impot: 100000.0
        categorie_is: 1
        investissement_biens_equipement: 600000.0
  output:
    entreprises:
      ent_1:
        deduction_reinvestissement_base: 100000.0


- name: "Réinvestissement physique + financier cumulés"
  # Équipements : 100 000 DT ; souscriptions capital : 50 000 DT
  # Base = 150 000 DT ; 35 % × 150 000 = 52 500 DT
  # Bénéfice = 400 000 DT → non plafonné → déduction = 52 500 DT
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        resultat_avant_impot: 400000.0
        categorie_is: 1
        investissement_biens_equipement: 100000.0
        souscriptions_capital_societes: 50000.0
  output:
    entreprises:
      ent_1:
        deduction_reinvestissement_base: 52500.0


