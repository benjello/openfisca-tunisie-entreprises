# Entreprises totalement exportatrices (ETE) — exonération IS

- name: "ETE — exonération IS totale pendant les 10 premières années (année 5)"
  # IS brut : 300 000 × 15 % = 45 000 DT ; année 5 → exonéré à 100 %
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        est_totalement_exportatrice: true
        annees_dans_regime_ete: 5
        resultat_avant_impot: 300000.0
        categorie_is: 1
  output:
    entreprises:
      ent_1:
        exoneration_is_ete: 45000.0


- name: "ETE — régime encore actif à l'année 10 (incluse)"
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
