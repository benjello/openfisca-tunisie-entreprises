- name: "Déduction formation plafonnée à la TFP brute"
  # Industrie → TFP brute = 5 000 DT ; formation = 8 000 DT > 5 000 → déductible = 5 000 DT
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        masse_salariale_brute: 500000.0
        secteur_activite: industries_manufacturieres
        depenses_formation_engagees: 8000.0
  output:
    entreprises:
      ent_1:
        depenses_formation_deductibles: 5000.0


- name: "TFP nette = TFP brute − dépenses de formation (si formation < TFP brute)"
  # Industrie : TFP brute = 5 000 DT ; formation = 2 000 DT → TFP nette = 3 000 DT
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
      etab_1:
        est_exonere_tcl: true
    entreprises:
      ent_1:
        siege_social:
          - etab_1
        masse_salariale_brute: 500000.0
        secteur_activite: industries_manufacturieres
        depenses_formation_engagees: 2000.0
  output:
    entreprises:
      ent_1:
        tfp_nette: 3000.0


- name: "TFP nette = 0 si les dépenses de formation couvrent toute la TFP brute"
  # TFP brute = 5 000 DT ; formation = 5 000 DT → TFP nette = 0
  period: "2023"
  absolute_error_margin: 1.0
  input:
    etablissements:
