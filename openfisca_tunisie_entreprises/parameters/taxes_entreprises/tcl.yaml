description: >
  Taxe sur les établissements à caractère industriel, commercial ou professionnel (TCL).
  Assise sur le chiffre d'affaires brut local (hors export) de chaque établissement.
  Perçue au profit des collectivités locales.

metadata:
  unit: /1
  reference:
    1997-01-01:
      title: "Loi n° 97-11 du 03/02/1997, Art. 45 et suivants — Code de la fiscalité locale"
  official_journal_date:
    1997-01-01: "1997-02-03"
  notes:
    1997-01-01:
    - title: "Création de la TCL à 0,2 % du CA brut local, avec un minimum de 100 DT par établissement. Affectée au budget des collectivités locales."

taux:
  description: Taux de la TCL sur le chiffre d'affaires brut local
  values:
    1997-01-01:
      value: 0.002

minimum_annuel:
  description: Montant minimum de TCL dû par établissement (en DT)
  metadata:
    unit: currency
  values:
    1997-01-01:
      value: 100.0
