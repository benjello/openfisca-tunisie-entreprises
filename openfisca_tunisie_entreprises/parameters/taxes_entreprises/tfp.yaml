description: >
  Taxe de Formation Professionnelle (TFP).
  Assise sur la masse salariale brute des employés résidents.
  Le taux varie selon le secteur d'activité.
  Une déduction est possible à concurrence des dépenses de formation
  effectivement engagées et justifiées.

