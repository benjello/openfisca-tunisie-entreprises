description: >
  Taux de retenue à la source sur les acquisitions de marchandises, matériel,
  équipements et services d'un montant égal ou supérieur à 1 000 DT TTC,
  effectuées par l'État, les collectivités locales, les personnes morales et
  les personnes physiques soumises au régime réel.
  Taux réduit applicable lorsque le bénéficiaire est une PM soumise à l'IS
  au taux normal (20 % depuis LF 2025).

