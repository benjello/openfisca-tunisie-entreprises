      title: "Loi n° 89-114 du 30/12/1989, Art. 52-I-c CIRPPIS"
  official_journal_date:
    1990-01-01: "1989-12-30"
  notes:
    1990-01-01:
    - title: "Taux RS revenus de capitaux mobiliers (intérêts) : 20 %, libératoire pour les personnes physiques. Inchangé depuis l'origine du CIRPPIS."

taux:
  description: >
    Taux RS sur revenus de capitaux mobiliers (intérêts servis à des PP et PM
    résidentes, hors dépôts en devises). Taux libératoire pour les PP.
  values:
    1990-01-01:
      value: 0.20
