description: >
  Taux de retenue à la source applicable aux revenus de capitaux mobiliers
  (intérêts, dividendes assimilés, etc.) versés à des résidents, à l'exception
  des intérêts sur dépôts en devises ou en dinars convertibles.

metadata:
