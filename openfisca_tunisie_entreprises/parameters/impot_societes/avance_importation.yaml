description: >
  Avance sur impôt due à l'importation de produits de consommation figurant sur
  la liste fixée par décret (décret n° 96-500 du 25/03/1996).
  Assiette : valeur en douane des produits majorée des droits et taxes exigibles.
  L'avance est imputable sur les acomptes provisionnels puis sur l'IS dû.

