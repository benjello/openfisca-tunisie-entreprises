description: >
  Taux de déduction des bénéfices provenant des opérations d'exportation.
  Applicable uniquement aux entreprises partiellement exportatrices (non ETE).
  La déduction = quote-part du résultat fiscal × taux.

  Historique :
    Jusqu'au 31/12/2020 : deux tiers (2/3) du résultat provenant de l'export
    (Art. 11 bis § V CIRPPIS).
    À compter du 1er janvier 2021 : supprimée (Art. 41 LF 2019-78 — les entreprises
    en activité avant le 31/12/2018 ont bénéficié du régime jusqu'au 31/12/2020).

