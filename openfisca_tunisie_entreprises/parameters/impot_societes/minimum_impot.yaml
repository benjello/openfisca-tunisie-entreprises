description: >
  Minimum d'impôt sur les sociétés (TMI — Taux Minimum d'Imposition).
  Exprimé en pourcentage du chiffre d'affaires brut (ventes + prestations).
  L'IS dû ne peut être inférieur à ce minimum, sauf régimes d'exonération.

metadata:
