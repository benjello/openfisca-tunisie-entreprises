description: >
  Taux du minimum d'imposition IS (TMI — Taux Minimum d'Imposition).
  Calculé sur le chiffre d'affaires brut (ventes + prestations de services).
  L'IS annuel dû ne peut être inférieur à ce minimum, sauf régimes d'exonération.
  Applicable à compter de la quatrième année d'activité effective.

