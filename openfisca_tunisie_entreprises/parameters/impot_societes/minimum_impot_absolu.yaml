description: >
  Montant minimum absolu du TMI en dinars, applicable aux sociétés soumises à l'IS
  au taux normal ou majoré. L'IS annuel ne peut être inférieur à ce plancher même
  en l'absence de chiffre d'affaires. Applicable à partir de la 4e année d'activité.

