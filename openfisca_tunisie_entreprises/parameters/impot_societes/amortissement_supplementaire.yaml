taux_equipements_industriels:
  description: >
    Taux de la déduction supplémentaire sur les équipements industriels acquis dans
    le cadre d'opérations d'extension ou de renouvellement (hors voitures de tourisme
    autres que celles constituant l'objet principal de l'exploitation).
  values:
    2017-01-01:
      value: 0.30

taux_equipements_enr:
  description: >
    Taux de la déduction supplémentaire sur les équipements et matériels productifs
    d'énergies alternatives ou renouvelables.
  values:
    2017-01-01:
      value: 0.30
