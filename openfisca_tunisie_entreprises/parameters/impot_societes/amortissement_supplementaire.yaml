description: >
  Déduction supplémentaire au titre des amortissements, accordée en plus de
  l'amortissement linéaire de droit commun, sur la valeur d'acquisition des
  équipements concernés, au titre de la première année d'utilisation.

  Deux dispositifs distincts :
    1. Équipements industriels (extension/renouvellement) — Art. 12 bis VIII CIRPPIS
       Taux : 30 % de la valeur d'acquisition
       Secteurs exclus : financier, énergie (sauf ENR), mines, promotion immobilière,
       restauration/hébergement sur place, commerce, opérateurs de télécom.
    2. Équipements ENR (énergies renouvelables) — Art. 12 bis IX CIRPPIS
       Taux : 30 % de la valeur d'acquisition
       Tous secteurs éligibles (avec attestation du ministère de l'énergie).

