description: >
  Taux du minimum d'imposition (TMI) applicable aux sociétés soumises à l'IS
  au taux réduit de 10 % : 0,1 % du chiffre d'affaires brut,
  soit la moitié du taux de droit commun (0,2 %).

metadata:
  unit: /1
  reference:
    2013-01-01:
      title: "Loi de finances n° 2012-27 du 29/12/2012, Art. 12 — Art. 49-II CIRPPIS"
    2021-01-01:
      title: "Loi de finances n° 2020-46 du 23/12/2020, Art. 14-16 et Art. 19 — Art. 49-II CIRPPIS"
  official_journal_date:
    2013-01-01: "2012-12-29"
    2021-01-01: "2020-12-23"
  notes:
    2013-01-01:
    - title: "Le TMI général est créé à 0,2 %. Le taux à 0,1 % s'applique aux entités relevant du taux IS réduit."
    2021-01-01:
    - title: "La LF 2021 institue le taux IS réduit de 10 % (entreprises individuelles, sociétés de personnes). Le TMI correspondant est fixé à 0,1 % du CA brut, soit la moitié du taux général."

values:
  2013-01-01:
    value: 0.001
