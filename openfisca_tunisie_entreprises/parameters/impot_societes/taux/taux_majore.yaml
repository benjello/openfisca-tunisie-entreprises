description: >
  Taux d'IS majoré applicable aux établissements de crédit, sociétés d'assurance
  et de réassurance, sociétés de leasing, sociétés de factoring, sociétés de
  recouvrement de créances, opérateurs de réseaux de télécommunication et
  sociétés exerçant l'activité de jeux (depuis LF 2021).

