description: >
  Taux d'IS majoré applicable aux banques, établissements financiers, sociétés
  d'assurance et de réassurance (y compris mutuelles et takaful).
  LF 2025 (LF 2024-48 du 09/12/2024) : relèvement de 35 % à 40 %.

