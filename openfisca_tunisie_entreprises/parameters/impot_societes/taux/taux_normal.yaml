description: >
  Taux d'IS de droit commun applicable aux sociétés résidentes.
  LF 2021 : abaissement de 25 % à 15 %.
  LF 2025 (LF 2024-48 du 09/12/2024) : relèvement de 15 % à 20 %, applicable
  aux bénéfices réalisés à partir du 1er janvier 2024.

