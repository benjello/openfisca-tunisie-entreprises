description: >
  Taux d'IS réduit de 10 % applicable aux entreprises individuelles, aux sociétés
  de personnes et à certains secteurs prioritaires (agriculture, pêche, artisanat,
  première transformation de produits agricoles, etc.).
  Introduit par la LF 2021 en remplacement du régime IRPP barème progressif pour
  ces entités.

