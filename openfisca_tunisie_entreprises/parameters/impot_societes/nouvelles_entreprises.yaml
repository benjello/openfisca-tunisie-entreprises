    - title: "Refonte des avantages fiscaux : le régime de déduction dégressive 100/75/50/25 % remplace l'ancien système d'exonération. Applicable aux entreprises créées à compter du 01/01/2017."
    2018-01-01:
    - title: "Régime spécial : exonération totale (100 %) pendant 4 ans pour les entreprises créées en 2018 et 2019, puis régime dégressive normal."
    2024-01-01:
    - title: "Renouvellement du régime spécial : exonération totale (100 %) pendant 4 ans pour les entreprises créées en 2024 et 2025."

