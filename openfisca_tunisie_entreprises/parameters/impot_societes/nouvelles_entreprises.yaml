description: >
  Déduction dégressive accordée aux nouvelles entreprises sur leurs bénéfices
  d'exploitation pendant les 4 premières années d'activité effective.

  Régime de droit commun (loi n° 2017-8 du 14/02/2017, Art. 11 CIRPPIS) :
    Année 1 : 100 %
    Année 2 :  75 %
    Année 3 :  50 %
    Année 4 :  25 %
    Année 5+ :  0 % (pas de déduction)

  Secteurs exclus : financier, énergie (sauf énergies renouvelables), mines,
  promotion immobilière, restauration/hébergement sur place, commerce,
  opérateurs de télécommunication.

